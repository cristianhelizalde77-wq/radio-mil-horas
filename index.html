<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a1628">
<meta name="description" content="Radio Mil Horas — Escuchá en vivo">
<title>Radio Mil Horas</title>

<style>
body {
  margin:0;
  background:#0a1628;
  color:white;
  font-family: Arial;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card {
  background:#111f3a;
  padding:30px;
  border-radius:20px;
  text-align:center;
}

button {
  font-size:20px;
  padding:15px 25px;
  border:none;
  border-radius:50px;
  background:#2176ff;
  color:white;
  cursor:pointer;
}

.status {
  margin-top:15px;
}
</style>
</head>

<body>

<div class="card">
  <h1>Radio Mil Horas</h1>
  <button onclick="togglePlay()">▶</button>
  <div class="status" id="status">Listo</div>
</div>

<audio id="audio"></audio>

<script>
const STREAM = 'https://icecast-production-9180.up.railway.app/radio.mp3';

const audio = document.getElementById("audio");
const status = document.getElementById("status");

let playing = false;

function togglePlay() {
  if (playing) {
    audio.pause();
    audio.src = "";
    status.textContent = "Detenido";
    playing = false;
  } else {
    status.textContent = "Conectando...";
    audio.src = STREAM;

    audio.play()
      .then(() => {
        status.textContent = "EN VIVO";
        playing = true;
      })
      .catch(() => {
        status.textContent = "Sin señal";
      });
  }
}
</script>

</body>
</html>
